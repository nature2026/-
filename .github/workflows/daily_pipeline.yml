name: Daily note Article Pipeline

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run pipeline
        env:
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          NOTE_EMAIL:          ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD:       ${{ secrets.NOTE_PASSWORD }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: python scripts/pipeline.py

      - name: Commit generated article
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin HEAD
          git add articles/
          git diff --cached --quiet && echo "変更なし" && exit 0
          TODAY=$(TZ=Asia/Tokyo date +%Y-%m-%d)
          git commit -m "feat: note article ${TODAY}"
          git push origin HEAD

      - name: Upload article as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: article-${{ github.run_id }}
          path: articles/
          retention-days: 30
